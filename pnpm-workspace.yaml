# Trix monorepo workspace
# packages/* 是 trix 内部库 (@trix/color, @trix/hooks 等)
packages:
  - packages/*
  - docs

ignoredBuiltDependencies:
  - '@parcel/watcher'
  - esbuild
  - unrs-resolver
  - vue-demi

# 🔧 本地开发：用 symlink 将 vschema-ui 指向本地源码
#    效果：trix 构建时使用本地 vschema-ui 的最新代码，改动即时生效
#    pnpm install 后 vschema-ui 会被软链接到 trix/node_modules/vschema-ui
# 发布时：pnpm-workspace.yaml 不会发布到 npm
#    用户通过 npm/pnpm install trix-admin 安装时，从 npm 拉取 vschema-ui 正式版
overrides:
  'vschema-ui': link:../vschema-ui
